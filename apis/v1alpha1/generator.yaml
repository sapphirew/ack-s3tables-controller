ignore:
  resource_names:
    - Table
  field_paths:
    # The SDK `namespace` field is a LIST in every shape; we expose a synthetic
    # scalar Name primary key instead and bridge to/from the list in hooks.
    # Drop the list field from every input/output so it never appears in the CR.
    - CreateNamespaceInput.Namespace
    - CreateNamespaceOutput.Namespace
    - GetNamespaceOutput.Namespace

resources:
  Namespace:
    fields:
      # Synthetic scalar primary key. NOT derived from an SDK field (the SDK
      # `namespace` create field is a LIST). Bridged to/from the list and the
      # scalar Get/Delete input via hooks.
      Name:
        type: "*string"
        is_primary_key: true
        is_immutable: true
      TableBucketARN:
        is_immutable: true
        references:
          resource: TableBucket
          path: Status.ACKResourceMetadata.ARN
      # AWS-assigned read-only outputs from GetNamespace.
      CreatedAt:
        is_read_only: true
        from:
          operation: GetNamespace
          path: CreatedAt
      CreatedBy:
        is_read_only: true
        from:
          operation: GetNamespace
          path: CreatedBy
      NamespaceID:
        is_read_only: true
        from:
          operation: GetNamespace
          path: NamespaceId
      TableBucketID:
        is_read_only: true
        from:
          operation: GetNamespace
          path: TableBucketId
    # The Get/Delete inputs take the namespace as a SCALAR (NamespaceName).
    # Rename them to the synthetic scalar primary key Name so ACK populates the
    # request automatically. (Create input/output are LISTs and are dropped via
    # ignore.field_paths; the create list is built from Name in a hook.)
    renames:
      operations:
        GetNamespace:
          input_fields:
            Namespace: Name
        DeleteNamespace:
          input_fields:
            Namespace: Name
    exceptions:
      errors:
        404:
          code: NotFoundException
    hooks:
      sdk_create_post_build_request:
        template_path: hooks/namespace/sdk_create_post_build_request.go.tpl
    tags:
      ignore: true

  TableBucket:
    fields:
      Name:
        is_primary_key: true
        is_immutable: true
      CreatedAt:
        is_read_only: true
        from:
          operation: GetTableBucket
          path: CreatedAt
      Type:
        is_read_only: true
        from:
          operation: GetTableBucket
          path: Type
        go_tag: json:"type,omitempty"
      # GetTableBucket does not return encryption/storage class config; S3 Tables
      # applies server-side defaults. Late initialize them so the defaults are
      # written back to the spec once and drift can still be detected if the
      # values are later changed out of band.
      EncryptionConfiguration:
        late_initialize:
          skip_incomplete_check: {}
      # Cross-resource reference to a KMS Key for SSE-KMS encryption.
      EncryptionConfiguration.KMSKeyARN:
        references:
          resource: Key
          service_name: kms
          path: Status.ACKResourceMetadata.ARN
      StorageClassConfiguration:
        late_initialize:
          skip_incomplete_check: {}
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - BadRequestException
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/table_bucket/sdk_read_one_post_set_output.go.tpl
    update_operation:
      custom_method_name: customUpdateTableBucket
