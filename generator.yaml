ignore:
  resource_names: []
  field_paths:
    # The SDK `namespace` field is a LIST in every shape; we expose a synthetic
    # scalar Name primary key instead and bridge to/from the list in hooks.
    # Drop the list field from every input/output so it never appears in the CR.
    - CreateNamespaceInput.Namespace
    - CreateNamespaceOutput.Namespace
    - GetNamespaceOutput.Namespace
    # GetTable returns `namespace` as a LIST, but CreateTable takes it as a
    # scalar (modeled as a reference to the Namespace resource). Drop the list
    # output and bridge the scalar back in the read hook.
    - GetTableOutput.Namespace
    # SchemaField.Required is a non-pointer bool in the SDK, which ACK cannot
    # round-trip cleanly (generates *bool, breaking the setter assignment).
    # Drop it; S3 Tables defaults required=false and assigns field IDs itself.
    - SchemaField.Required

resources:
  Table:
    fields:
      # Primary key, but MUTABLE via RenameTable. To detect a rename, the read
      # path keys off the stable tableARN (see sdk_read_one_post_build_request)
      # so GetTable returns the CURRENT AWS name; a spec.name change then shows
      # up as a delta and customUpdateTable calls RenameTable.
      Name:
        is_primary_key: true
      # Parent table bucket, referenced by ARN (same-service — no service_name).
      TableBucketARN:
        is_required: true
        is_immutable: true
        references:
          resource: TableBucket
          path: Status.ACKResourceMetadata.ARN
      # Parent namespace, referenced by name (same-service — no service_name).
      # Scalar in the Create/Get/Delete inputs; the list-typed GetTable output
      # member is dropped (see ignore.field_paths) and bridged in a read hook.
      Namespace:
        is_required: true
        is_immutable: true
        references:
          resource: Namespace
          path: Spec.Name
      # Create-only / immutable configuration.
      Format:
        is_immutable: true
      Metadata:
        is_immutable: true
      Metadata.Iceberg.Schema.Fields.Type:
        go_tag: json:"type,omitempty"
      EncryptionConfiguration:
        is_immutable: true
      StorageClassConfiguration:
        is_immutable: true
      # AWS-assigned, used as an optimistic-concurrency guard on delete/rename.
      VersionToken:
        is_read_only: true
        from:
          operation: GetTable
          path: VersionToken
      # Read-only status fields from the flat GetTable response.
      TableARN:
        is_read_only: true
        from:
          operation: GetTable
          path: TableARN
      Type:
        is_read_only: true
        from:
          operation: GetTable
          path: Type
        go_tag: json:"type,omitempty"
      NamespaceID:
        is_read_only: true
        from:
          operation: GetTable
          path: NamespaceId
      TableBucketID:
        is_read_only: true
        from:
          operation: GetTable
          path: TableBucketId
      MetadataLocation:
        is_read_only: true
        from:
          operation: GetTable
          path: MetadataLocation
      WarehouseLocation:
        is_read_only: true
        from:
          operation: GetTable
          path: WarehouseLocation
      CreatedAt:
        is_read_only: true
        from:
          operation: GetTable
          path: CreatedAt
      ModifiedAt:
        is_read_only: true
        from:
          operation: GetTable
          path: ModifiedAt
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - BadRequestException
    hooks:
      # GetTable accepts name triplet OR tableArn; clear tableArn so the read
      # uses the name triplet (ACK populates both).
      sdk_read_one_post_build_request:
        template_path: hooks/table/sdk_read_one_post_build_request.go.tpl
      # GetTable returns namespace as a list; bridge resp.Namespace[0] back into
      # the scalar Spec.Namespace and fetch tags via ListTagsForResource.
      sdk_read_one_post_set_output:
        template_path: hooks/table/sdk_read_one_post_set_output.go.tpl
    # No generic Update API: name is changed via RenameTable, tags via
    # TagResource/UntagResource. Everything else is immutable.
    update_operation:
      custom_method_name: customUpdateTable
  Namespace:
    fields:
      # Synthetic scalar primary key. NOT derived from an SDK field (the SDK
      # `namespace` create field is a LIST). Bridged to/from the list and the
      # scalar Get/Delete input via hooks.
      Name:
        type: "*string"
        is_primary_key: true
        is_immutable: true
      TableBucketARN:
        is_immutable: true
        references:
          resource: TableBucket
          path: Status.ACKResourceMetadata.ARN
      # AWS-assigned read-only outputs from GetNamespace.
      CreatedAt:
        is_read_only: true
        from:
          operation: GetNamespace
          path: CreatedAt
      CreatedBy:
        is_read_only: true
        from:
          operation: GetNamespace
          path: CreatedBy
      NamespaceID:
        is_read_only: true
        from:
          operation: GetNamespace
          path: NamespaceId
      TableBucketID:
        is_read_only: true
        from:
          operation: GetNamespace
          path: TableBucketId
    # The Get/Delete inputs take the namespace as a SCALAR (NamespaceName).
    # Rename them to the synthetic scalar primary key Name so ACK populates the
    # request automatically. (Create input/output are LISTs and are dropped via
    # ignore.field_paths; the create list is built from Name in a hook.)
    renames:
      operations:
        GetNamespace:
          input_fields:
            Namespace: Name
        DeleteNamespace:
          input_fields:
            Namespace: Name
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - BadRequestException
    hooks:
      sdk_create_post_build_request:
        template_path: hooks/namespace/sdk_create_post_build_request.go.tpl
    tags:
      ignore: true

  TableBucket:
    fields:
      Name:
        is_primary_key: true
        is_immutable: true
      CreatedAt:
        is_read_only: true
        from:
          operation: GetTableBucket
          path: CreatedAt
      Type:
        is_read_only: true
        from:
          operation: GetTableBucket
          path: Type
        go_tag: json:"type,omitempty"
      # GetTableBucket does not return encryption/storage class config; S3 Tables
      # applies server-side defaults. Late initialize them so the defaults are
      # written back to the spec once and drift can still be detected if the
      # values are later changed out of band.
      EncryptionConfiguration:
        late_initialize:
          skip_incomplete_check: {}
      # Cross-resource reference to a KMS Key for SSE-KMS encryption.
      EncryptionConfiguration.KMSKeyARN:
        references:
          resource: Key
          service_name: kms
          path: Status.ACKResourceMetadata.ARN
      StorageClassConfiguration:
        late_initialize:
          skip_incomplete_check: {}
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - BadRequestException
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/table_bucket/sdk_read_one_post_set_output.go.tpl
    update_operation:
      custom_method_name: customUpdateTableBucket
