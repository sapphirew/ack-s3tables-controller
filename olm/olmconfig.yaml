description: |-
  Manage Amazon S3 Tables resources in AWS from within your Kubernetes cluster.


  **About Amazon S3 Tables**


  Amazon S3 Tables deliver the first cloud object store with built-in Apache Iceberg support, and the easiest way to store tabular data at scale. S3 Tables are specifically optimized for analytics workloads, resulting in continually improving query performance and lower compute costs for tabular data. S3 Tables organize tabular data in table buckets, a new bucket type purpose-built to store tabular data. You can use S3 Tables with AWS analytics services through the integration with Amazon SageMaker Lakehouse, as well as Apache Iceberg-compatible open source tools.


  **About the AWS Controllers for Kubernetes**


  This controller is a component of the [AWS Controller for Kubernetes](https://github.com/aws/aws-controllers-k8s)
  project.


  **Pre-Installation Steps**


  Please follow the following link: [Red Hat OpenShift](https://aws-controllers-k8s.github.io/community/docs/user-docs/openshift/)
